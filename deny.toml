# cargo-deny configuration for awzars
#
# Run locally:
#   cargo install cargo-deny
#   cargo deny check
#
# This config enforces the project's security posture:
#   * rustls-only TLS (OpenSSL / native-tls are banned at runtime)
#   * advisory scanning against RustSec
#   * explicit licence allow-list
#   * flag any git or non-crates.io source

[graph]
# Limit analysis to tier-1 targets we actually ship.
targets = [
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]
all-features = false
no-default-features = false

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
]
confidence-threshold = 0.8
# ring's license is a compound of BSD/ISC/MIT/OpenSSL; accept it explicitly.
exceptions = [
    { allow = ["ISC", "MIT", "OpenSSL"], name = "ring" },
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# Hard-ban TLS stacks we do not use. If any of these appear in the dep graph,
# something pulled in OpenSSL/native-tls by accident (e.g. a reqwest feature
# regression) and we need to fix the feature flags.
#
# Note: `openssl-probe` is intentionally NOT banned. Despite its name, the
# crate has zero dependencies and only contains hard-coded paths used by
# `rustls-native-certs` to locate the system CA bundle on Linux/BSD. It does
# not link OpenSSL.
deny = [
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "native-tls" },
]

# Packages we intentionally allow to coexist in multiple versions because
# transitive deps pin different majors. Keep this list trimmed.
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
